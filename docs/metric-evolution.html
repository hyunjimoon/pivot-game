<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>자가 켜지는 나침반 — (점수, 평가기준)의 진화</title>
<style>
  :root{
    --cream:#F5F1E8; --ink:#2B2B2B; --line:#C9C0AC; --muted:#9A927E;
    --user:#2563EB;    /* 사용자 파랑 */
    --tech:#7C3AED;    /* 기술자 보라 */
    --investor:#DC2626;/* 투자자 빨강 */
    --collab:#059669;  /* 협력자 초록 */
    --accent:#EA580C;  /* 슬로건 주황 */
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--cream); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1160px; margin:0 auto; padding:40px 24px 56px}
  header h1{
    font-family:Georgia,"Times New Roman",serif;
    font-size:1.7rem; line-height:1.25; margin:0 0 10px; letter-spacing:-.01em;
  }
  header h1 .kbd{color:var(--collab)}
  header p.sub{margin:0 0 4px; font-size:1rem; color:#4a463c; max-width:820px}
  header p.sub b.c{color:var(--collab)} header p.sub b.u{color:var(--user)}
  header p.sub b.d{color:var(--accent)}
  .diagram{width:100%; overflow-x:auto; margin-top:26px}
  svg{display:block; margin:0 auto; width:100%; height:auto; max-width:1120px; min-width:720px}
  .legend{
    margin:22px auto 0; max-width:1120px; font-size:.82rem; color:#54503f;
    display:flex; flex-wrap:wrap; gap:8px 26px; align-items:center; justify-content:center;
    border-top:1px solid var(--line); padding-top:16px;
  }
  .legend span{display:inline-flex; align-items:center; gap:7px}
  .swatch{width:26px; height:0; border-top-width:3px; border-top-style:solid; display:inline-block}
  .num{display:inline-flex; width:19px; height:19px; border-radius:50%; background:var(--ink); color:var(--cream);
       align-items:center; justify-content:center; font-size:.72rem; font-weight:700}
  footer{margin-top:30px; text-align:center; font-size:.78rem; color:var(--muted); letter-spacing:.02em}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="kbd">자(尺)</span>가 켜지는 나침반 — (점수, 평가기준)의 진화</h1>
    <p class="sub">4 이해관계자 중 <b>2 극</b>이 자를 얻었다 — <b class="c">협력자 = 📐자</b>(답했나·coverage) · <b class="u">사용자 = /listener</b>(움직였나·change). 나머지 둘은 아직 미탄생(2/4).</p>
    <p class="sub">상단 두 자의 <b class="d">간격 = 빚</b> — “답은 했는데 안 움직인” 자리.</p>
  </header>

  <div class="diagram">
  <svg viewBox="0 0 1120 760" role="img" aria-label="(점수, 평가기준)의 진화를 4극 나침반으로 표현한 다이어그램">
    <defs>
      <pattern id="hatch" width="7" height="7" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
        <rect width="7" height="7" fill="#059669" opacity="0.14"/>
        <line x1="0" y1="0" x2="0" y2="7" stroke="#059669" stroke-width="2.4" opacity="0.55"/>
      </pattern>
      <marker id="tick" markerWidth="4" markerHeight="10" refX="2" refY="5">
        <line x1="2" y1="0" x2="2" y2="10" stroke="#54503f" stroke-width="1"/>
      </marker>
    </defs>

    <!-- ===== axis captions ===== -->
    <text x="250" y="52" text-anchor="middle" font-size="15" font-weight="700" fill="#54503f" letter-spacing="1">답했나 · COVERAGE</text>
    <text x="870" y="52" text-anchor="middle" font-size="15" font-weight="700" fill="#54503f" letter-spacing="1">움직였나 · CHANGE</text>
    <!-- gap = debt ribbon -->
    <line x1="360" y1="46" x2="760" y2="46" stroke="#EA580C" stroke-width="1.4" stroke-dasharray="2 5"/>
    <text x="560" y="42" text-anchor="middle" font-size="12.5" font-weight="700" fill="#EA580C">◄ 간격 = 빚 ►</text>

    <!-- ===== spokes (center → cards) ===== -->
    <!-- solid to lit poles -->
    <line x1="486" y1="330" x2="440" y2="286" stroke="#059669" stroke-width="3"/>
    <line x1="634" y1="330" x2="680" y2="286" stroke="#2563EB" stroke-width="3"/>
    <!-- dashed to pending poles -->
    <line x1="486" y1="430" x2="440" y2="474" stroke="#B7AF9A" stroke-width="2.4" stroke-dasharray="5 5"/>
    <line x1="634" y1="430" x2="680" y2="474" stroke="#B7AF9A" stroke-width="2.4" stroke-dasharray="5 5"/>

    <!-- ===== center node ===== -->
    <rect x="486" y="330" width="148" height="100" rx="12" fill="#fff" stroke="#54503f" stroke-width="1.6"/>
    <text x="560" y="368" text-anchor="middle" font-size="15" font-weight="700" fill="#2B2B2B">0712 대본</text>
    <text x="560" y="390" text-anchor="middle" font-size="12" fill="#6b6656">측정 대상</text>
    <text x="560" y="412" text-anchor="middle" font-size="11.5" fill="#9A927E">사·기·투·협 격자</text>

    <!-- ============ ① 협력자 (TOP-LEFT, LIT, 초록) ============ -->
    <g>
      <rect x="70" y="86" width="380" height="204" rx="14" fill="#fff" stroke="#059669" stroke-width="2.4"/>
      <rect x="70" y="86" width="7" height="204" rx="3" fill="#059669"/>
      <circle cx="102" cy="118" r="15" fill="#059669"/>
      <text x="102" y="123" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">①</text>
      <text x="130" y="115" font-size="18" font-weight="700" fill="#2B2B2B">🐦‍⬛ 협력자</text>
      <text x="130" y="136" font-size="12.5" fill="#059669" font-weight="700">metric quality — 합의된 외부 자</text>
      <text x="90" y="170" font-size="15" font-weight="700" fill="#2B2B2B">📐자 · RUBRIC.md</text>
      <text x="90" y="190" font-size="12" fill="#6b6656">“11 질문에 계산끝내 답했나” · 0–3 × 11</text>
      <!-- gauge -->
      <rect x="90" y="212" width="320" height="20" rx="4" fill="#EDE7D6" stroke="#D8CFB8"/>
      <rect x="90" y="212" width="174" height="20" rx="4" fill="#059669"/>            <!-- 18/33 solid -->
      <rect x="264" y="212" width="117" height="20" fill="url(#hatch)"/>              <!-- 18→30 target -->
      <line x1="264" y1="207" x2="264" y2="237" stroke="#054d33" stroke-width="1.4"/>
      <line x1="381" y1="207" x2="381" y2="237" stroke="#054d33" stroke-width="1.4"/>
      <text x="264" y="252" text-anchor="middle" font-size="11.5" font-weight="700" fill="#054d33">18</text>
      <text x="381" y="252" text-anchor="middle" font-size="11.5" font-weight="700" fill="#054d33">30</text>
      <text x="410" y="252" text-anchor="end" font-size="11.5" fill="#9A927E">/ 33</text>
      <text x="90" y="278" font-size="12" fill="#6b6656"><tspan font-weight="700" fill="#059669">■</tspan> 베이스라인 18 &#8594; <tspan fill="url(#hatch)">▨</tspan> 4-agent 목표 30 (91%)</text>
    </g>

    <!-- ============ ② 사용자 (TOP-RIGHT, LIT, 파랑) ============ -->
    <g>
      <rect x="690" y="86" width="380" height="204" rx="14" fill="#fff" stroke="#2563EB" stroke-width="2.4"/>
      <rect x="1063" y="86" width="7" height="204" rx="3" fill="#2563EB"/>
      <circle cx="722" cy="118" r="15" fill="#2563EB"/>
      <text x="722" y="123" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">②</text>
      <text x="750" y="115" font-size="18" font-weight="700" fill="#2B2B2B">🦋 사용자</text>
      <text x="750" y="136" font-size="12.5" fill="#2563EB" font-weight="700">desirability — 청중이 스스로 말한다</text>
      <text x="710" y="170" font-size="15" font-weight="700" fill="#2B2B2B">/listener · LISTENER.md <tspan font-size="11.5" fill="#EA580C" font-weight="700">신생</tspan></text>
      <text x="710" y="190" font-size="12" fill="#6b6656">“도구 들고 나가나” · 5 청자 × 0–3</text>
      <!-- 5 청자 mini-bars: 유학1·불안2·창업2·스펙1·관망1 -->
      <g font-size="10.5" text-anchor="middle">
        <!-- baseline of bars y=250, max height 48 (score3) -->
        <!-- 유학 1 -->
        <rect x="718" y="230" width="46" height="18" rx="2" fill="#2563EB" opacity="0.85"/>
        <text x="741" y="243" fill="#fff" font-weight="700">1</text>
        <text x="741" y="266" fill="#54503f">유학</text>
        <!-- 불안 2 -->
        <rect x="784" y="212" width="46" height="36" rx="2" fill="#2563EB"/>
        <text x="807" y="243" fill="#fff" font-weight="700">2</text>
        <text x="807" y="266" fill="#54503f">불안</text>
        <!-- 창업 2 -->
        <rect x="850" y="212" width="46" height="36" rx="2" fill="#2563EB"/>
        <text x="873" y="243" fill="#fff" font-weight="700">2</text>
        <text x="873" y="266" fill="#54503f">창업</text>
        <!-- 스펙 1 -->
        <rect x="916" y="230" width="46" height="18" rx="2" fill="#2563EB" opacity="0.85"/>
        <text x="939" y="243" fill="#fff" font-weight="700">1</text>
        <text x="939" y="266" fill="#54503f">스펙</text>
        <!-- 관망 1 -->
        <rect x="982" y="230" width="46" height="18" rx="2" fill="#2563EB" opacity="0.85"/>
        <text x="1005" y="243" fill="#fff" font-weight="700">1</text>
        <text x="1005" y="266" fill="#54503f">관망</text>
      </g>
      <line x1="710" y1="248" x2="1050" y2="248" stroke="#D8CFB8" stroke-width="1"/>
      <text x="710" y="284" font-size="12" fill="#6b6656">승리 = 5인 각자 <tspan font-weight="700" fill="#2563EB">tool 1개</tspan> 손에 쥠 (☐ 아직)</text>
    </g>

    <!-- ============ ③ 기술자 (BOTTOM-LEFT, PENDING, 보라) ============ -->
    <g opacity="0.72">
      <rect x="70" y="470" width="380" height="204" rx="14" fill="#F1EBDC" stroke="#7C3AED" stroke-width="2" stroke-dasharray="7 6"/>
      <circle cx="102" cy="502" r="15" fill="none" stroke="#7C3AED" stroke-width="2"/>
      <text x="102" y="507" text-anchor="middle" font-size="15" font-weight="700" fill="#7C3AED">③</text>
      <text x="130" y="499" font-size="18" font-weight="700" fill="#5b5647">🌷 기술자</text>
      <text x="130" y="520" font-size="12.5" fill="#7C3AED" font-weight="700">feasibility — 지을 수 있나</text>
      <text x="90" y="556" font-size="15" font-weight="700" fill="#7C3AED">feasibility 자 <tspan fill="#9A927E" font-weight="400">— 아직 없음</tspan></text>
      <!-- empty dashed track -->
      <rect x="90" y="574" width="320" height="20" rx="4" fill="none" stroke="#B7AF9A" stroke-width="1.4" stroke-dasharray="6 6"/>
      <text x="250" y="589" text-anchor="middle" font-size="12" fill="#9A927E">TODO</text>
      <text x="90" y="632" font-size="12.5" fill="#6b6656">“이 방 학생이 실제로 <tspan font-weight="700">재현</tspan>할 수 있나?”</text>
      <text x="90" y="652" font-size="11.5" fill="#9A927E">현재 /tech 는 비평 agent로만 존재 (상시 자 아님)</text>
    </g>

    <!-- ============ ④ 투자자 (BOTTOM-RIGHT, PENDING, 빨강) ============ -->
    <g opacity="0.72">
      <rect x="690" y="470" width="380" height="204" rx="14" fill="#F1EBDC" stroke="#DC2626" stroke-width="2" stroke-dasharray="7 6"/>
      <circle cx="722" cy="502" r="15" fill="none" stroke="#DC2626" stroke-width="2"/>
      <text x="722" y="507" text-anchor="middle" font-size="15" font-weight="700" fill="#DC2626">④</text>
      <text x="750" y="499" font-size="18" font-weight="700" fill="#5b5647">🌫️ 투자자</text>
      <text x="750" y="520" font-size="12.5" fill="#DC2626" font-weight="700">viability — 값어치인가</text>
      <text x="710" y="556" font-size="15" font-weight="700" fill="#DC2626">viability 자 <tspan fill="#9A927E" font-weight="400">— 아직 없음</tspan></text>
      <rect x="710" y="574" width="320" height="20" rx="4" fill="none" stroke="#B7AF9A" stroke-width="1.4" stroke-dasharray="6 6"/>
      <text x="870" y="589" text-anchor="middle" font-size="12" fill="#9A927E">TODO</text>
      <text x="710" y="632" font-size="12.5" fill="#6b6656">“매 분이 40분 주의력 자본을 <tspan font-weight="700">벌었나</tspan>?”</text>
      <text x="710" y="652" font-size="11.5" fill="#9A927E">현재 /investor 는 비평 agent로만 존재 (상시 자 아님)</text>
    </g>

    <!-- birth-order arc (① → ② → ③④) -->
    <text x="560" y="712" text-anchor="middle" font-size="12.5" fill="#54503f">
      탄생 순서 &nbsp; <tspan font-weight="700" fill="#059669">①</tspan> 📐자 &#8594;
      <tspan font-weight="700" fill="#2563EB">②</tspan> /listener &#8594;
      <tspan font-weight="700" fill="#7C3AED">③</tspan> +
      <tspan font-weight="700" fill="#DC2626">④</tspan> 미탄생
    </text>
  </svg>
  </div>

  <div class="legend">
    <span><span class="num">①</span> 자가 태어난 순서 (① 먼저)</span>
    <span><span class="swatch" style="border-color:#059669"></span> 실선 = 점등 (자 보유)</span>
    <span><span class="swatch" style="border-color:#B7AF9A; border-top-style:dashed"></span> 점선 = 미탄생 (2/4)</span>
    <span><span class="swatch" style="border-color:#EA580C; border-top-style:dashed"></span> 상단 두 자의 간격 = 빚</span>
  </div>

  <footer>pivot-game · 遺事 · 2026-07-12 · 밀리기 전에 뛰어내려라</footer>
</div>
</body>
</html>
